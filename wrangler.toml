name = "sistema_gh"
main = ".open-next/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
# Non-secret vars can go here; secrets go via wrangler secret put or dashboard
# NOTE: cron triggers are handled by cron-job.org calling the HTTP endpoints:
#   GET /api/cron/kanban-daily   — daily at 08:00 UTC  (Authorization: Bearer CRON_SECRET)
#   GET /api/cron/kanban-weekly  — Monday at 08:00 UTC (Authorization: Bearer CRON_SECRET)
